<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BPMN — order-tracking</title>
<!-- MODELER (không phải viewer) → kéo-thả sửa như bpmn.io. Nút Tải/Lưu để giữ thay đổi. -->
<link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.11.1/dist/assets/diagram-js.css">
<link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.11.1/dist/assets/bpmn-js.css">
<link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.11.1/dist/assets/bpmn-font/css/bpmn.css">
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #toolbar { position: fixed; top: 0; left: 0; right: 0; height: 46px; background: #1a1a2e; color: #fff;
             display: flex; align-items: center; gap: 10px; padding: 0 16px; z-index: 10; font-size: 14px; }
  #toolbar b { font-weight: 600; }
  #toolbar select { background: #16213e; color: #fff; border: 1px solid #0f3460; border-radius: 6px;
                    padding: 5px 10px; font-size: 13px; }
  #toolbar .sp { flex: 1; }
  #toolbar button { background: #16213e; color: #fff; border: 1px solid #0f3460; border-radius: 6px;
                    padding: 5px 12px; cursor: pointer; font-size: 13px; }
  #toolbar button:hover { background: #0f3460; }
  #toolbar button.primary { background: #2d6a4f; border-color: #40916c; }
  #toolbar button.primary:hover { background: #40916c; }
  #dirty { color: #ffd166; font-size: 12px; display: none; }
  #canvas { position: absolute; top: 46px; left: 0; right: 0; bottom: 0; background: #fafafa; }
  #err { position: fixed; top: 60px; left: 16px; right: 16px; background: #fee; color: #900;
         padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap;
         display: none; z-index: 20; }
  .bjs-powered-by { display: none; }
</style>
<script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-modeler.production.min.js"></script>
</head>
<body>
<div id="toolbar">
  <b>✏️ BPMN Editor</b>
  <select id="picker"></select>
  <span id="dirty">● có thay đổi chưa lưu</span>
  <span class="sp"></span>
  <button onclick="zoomFit()">Fit</button>
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">−</button>
  <button class="primary" onclick="download()">⬇ Tải .bpmn</button>
  <button class="primary" id="saveBtn" onclick="saveToFile()" title="Ghi đè file (cần chạy qua server hoặc trình duyệt hỗ trợ File System Access)">💾 Lưu</button>
</div>
<div id="canvas"></div>
<div id="err"></div>

<script>
  // Mỗi process {slug, title, xml}. Modeler cho phép sửa; nhớ Tải/Lưu trước khi đổi process.
  var PROCESSES = [
  { slug: "create-order", title: "Luồng tạo đơn hàng", xml: `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" id="Def_1" targetNamespace="http://bpmn.io/schema/bpmn">
  <bpmn:collaboration id="Collaboration_1">
    <bpmn:participant id="Participant_1" name="Luồng tạo đơn hàng" processRef="Process_create-order" />
  </bpmn:collaboration>
  <bpmn:process id="Process_create-order" isExecutable="false">
    <bpmn:laneSet id="LaneSet_1">
      <bpmn:lane id="Lane_Sales" name="Maker (Sales)">
        <bpmn:flowNodeRef>Start_1</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>GW_Action</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Edit</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Input</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Submit</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Fix</bpmn:flowNodeRef>
      </bpmn:lane>
      <bpmn:lane id="Lane_System" name="Hệ thống">
        <bpmn:flowNodeRef>GW_Validate</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Invalid</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Init</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>GW_CheckState</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Update</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_RejectEdit</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_API</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>GW_API</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_APISuccess</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>End_Success</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_APIFail</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>End_APIFail</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>End_RejectEdit</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Export</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Refund</bpmn:flowNodeRef>
      </bpmn:lane>
      <bpmn:lane id="Lane_Admin" name="Checker (Admin)">
        <bpmn:flowNodeRef>Task_View</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>GW_Approve</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Reject</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>End_Reject</bpmn:flowNodeRef>
        <bpmn:flowNodeRef>Task_Approve</bpmn:flowNodeRef>
      </bpmn:lane>
    </bpmn:laneSet>
    <bpmn:startEvent id="Start_1" name="Bắt đầu tạo đơn">
      <bpmn:outgoing>F1</bpmn:outgoing>
    </bpmn:startEvent>
    <bpmn:exclusiveGateway id="GW_Validate" name="Dữ liệu hợp lệ &#38; đủ số lượng?">
      <bpmn:incoming>F3</bpmn:incoming>
      <bpmn:outgoing>F4</bpmn:outgoing>
      <bpmn:outgoing>F7</bpmn:outgoing>
    </bpmn:exclusiveGateway>
    <bpmn:task id="Task_Invalid" name="Trả về lỗi &#38; highlight trường sai">
      <bpmn:incoming>F4</bpmn:incoming>
      <bpmn:outgoing>F5</bpmn:outgoing>
    </bpmn:task>
    <bpmn:task id="Task_Init" name="Khởi tạo đơn hàng (Chờ duyệt) &#38; Tạm giữ số lượng">
      <bpmn:incoming>F7</bpmn:incoming>
      <bpmn:outgoing>F8</bpmn:outgoing>
    </bpmn:task>
    <bpmn:exclusiveGateway id="GW_Action" name="Hành động tiếp theo?">
      <bpmn:incoming>F8</bpmn:incoming>
      <bpmn:incoming>F12</bpmn:incoming>
      <bpmn:outgoing>F9</bpmn:outgoing>
      <bpmn:outgoing>F15</bpmn:outgoing>
    </bpmn:exclusiveGateway>
    <bpmn:task id="Task_Edit" name="Sửa thông tin đơn &#38; Bấm Lưu chỉnh sửa">
      <bpmn:incoming>F9</bpmn:incoming>
      <bpmn:outgoing>F10</bpmn:outgoing>
    </bpmn:task>
    <bpmn:exclusiveGateway id="GW_CheckState" name="Đơn đã được duyệt/từ chối chưa?">
      <bpmn:incoming>F10</bpmn:incoming>
      <bpmn:outgoing>F11</bpmn:outgoing>
      <bpmn:outgoing>F13</bpmn:outgoing>
    </bpmn:exclusiveGateway>
    <bpmn:task id="Task_Update" name="Lưu cập nhật, tăng Version, báo thành công">
      <bpmn:incoming>F11</bpmn:incoming>
      <bpmn:outgoing>F12</bpmn:outgoing>
    </bpmn:task>
    <bpmn:task id="Task_RejectEdit" name="Từ chối lưu &#38; báo lỗi">
      <bpmn:incoming>F13</bpmn:incoming>
      <bpmn:outgoing>F14</bpmn:outgoing>
    </bpmn:task>
    <bpmn:task id="Task_View" name="Xem danh sách và chi tiết đơn chờ duyệt">
      <bpmn:incoming>F15</bpmn:incoming>
      <bpmn:outgoing>F16</bpmn:outgoing>
    </bpmn:task>
    <bpmn:exclusiveGateway id="GW_Approve" name="Quyết định phê duyệt?">
      <bpmn:incoming>F16</bpmn:incoming>
      <bpmn:outgoing>F17</bpmn:outgoing>
      <bpmn:outgoing>F20</bpmn:outgoing>
    </bpmn:exclusiveGateway>
    <bpmn:task id="Task_Reject" name="Nhập lý do &#38; Xác nhận từ chối">
      <bpmn:incoming>F17</bpmn:incoming>

    <bpmn:sequenceFlow id="F2" name="" sourceRef="Task_Input" targetRef="Task_Submit" />
    <bpmn:sequenceFlow id="F3" name="" sourceRef="Task_Submit" targetRef="GW_Validate" />

      <bpmn:outgoing>F2</bpmn:outgoing>

    <bpmn:task id="Task_Submit" name="Bấm Xác nhận tạo đơn">

    <bpmn:endEvent id="End_RejectEdit" name="Không thể sửa">
      <bpmn:incoming>F14</bpmn:incoming>
    </bpmn:endEvent>
    <bpmn:task id="Task_Export" name="Sinh Bản ghi Xuất kho (Chờ duyệt) &#38; Gửi SMS cho KH">
      <bpmn:incoming>F21</bpmn:incoming>
      <bpmn:outgoing>F22</bpmn:outgoing>
    </bpmn:task>
    <bpmn:task id="Task_Refund" name="Giải phóng số lượng tạm giữ, chuyển Từ Chối, Auto Refund">
      <bpmn:incoming>F18</bpmn:incoming>
      <bpmn:outgoing>F19</bpmn:outgoing>
    </bpmn:task>

  var modeler = new BpmnJS({ container: '#canvas' });
  var current = null;           // process đang mở
  var dirty = false;            // có sửa chưa lưu
  var fileHandles = {};         // slug → FileSystemFileHandle (nếu đã chọn/mở qua FS API)

  var picker = document.getElementById('picker');
  PROCESSES.forEach(function (p) {
    var o = document.createElement('option');
    o.value = p.slug; o.textContent = p.title;
    picker.appendChild(o);
  });
  picker.addEventListener('change', function () {
    if (dirty && !confirm('Process này có thay đổi chưa lưu. Đổi sẽ mất. Tiếp tục?')) {
      picker.value = current.slug; return;
    }
    location.hash = picker.value;
  });

  function setDirty(v) { dirty = v; document.getElementById('dirty').style.display = v ? 'inline' : 'none'; }

  function show(slug) {
    var p = PROCESSES.filter(function (x) { return x.slug === slug; })[0] || PROCESSES[0];
    if (!p) return;
    current = p; picker.value = p.slug;
    document.title = 'BPMN — ' + p.title;
    document.getElementById('err').style.display = 'none';
    modeler.importXML(p.xml).then(function () {
      zoomFit(); setDirty(false);
      // đánh dấu dirty khi user sửa
      modeler.on('commandStack.changed', function () { setDirty(true); });
    }).catch(function (e) {
      var el = document.getElementById('err');
      el.style.display = 'block';
      el.textContent = 'Lỗi render "' + p.title + '":\n' + (e && e.message ? e.message : e) +
        (e && e.warnings ? '\n\nWarnings:\n' + JSON.stringify(e.warnings, null, 2) : '');
      console.error(e);
    });
  }

  // Lấy XML hiện tại (đã sửa) từ modeler
  function currentXml() {
    return modeler.saveXML({ format: true }).then(function (r) { return r.xml; });
  }

  // Tải file .bpmn về máy (chế độ đơn giản — không cần server)
  window.download = function () {
    currentXml().then(function (xml) {
      var blob = new Blob([xml], { type: 'application/xml' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = current.slug + '.bpmn';
      a.click(); URL.revokeObjectURL(a.href);
      setDirty(false);
    });
  };

  // Lưu ghi đè file gốc (cần File System Access API — Chrome/Edge, chạy qua http(s) hoặc file mở qua picker)
  window.saveToFile = function () {
    currentXml().then(function (xml) {
      if (!window.showSaveFilePicker) {
        alert('Trình duyệt không hỗ trợ ghi file trực tiếp.\nDùng nút "⬇ Tải .bpmn" rồi chép đè vào repo,\nhoặc chạy qua server (xem hướng dẫn cuối file HTML).');
        return;
      }
      var h = fileHandles[current.slug];
      var chain = h ? Promise.resolve(h) : window.showSaveFilePicker({
        suggestedName: current.slug + '.bpmn',
        types: [{ description: 'BPMN', accept: { 'application/xml': ['.bpmn'] } }]
      }).then(function (handle) { fileHandles[current.slug] = handle; return handle; });
      chain.then(function (handle) {
        return handle.createWritable().then(function (w) {
          return w.write(xml).then(function () { return w.close(); });
        });
      }).then(function () { setDirty(false); }).catch(function (e) { if (e.name !== 'AbortError') alert('Lưu lỗi: ' + e.message); });
    });
  };

  window.zoomFit = function () { modeler.get('canvas').zoom('fit-viewport', 'auto'); };
  window.zoomIn  = function () { modeler.get('zoomScroll').stepZoom(1); };
  window.zoomOut = function () { modeler.get('zoomScroll').stepZoom(-1); };
  window.addEventListener('hashchange', function () { show(location.hash.slice(1)); });
  window.addEventListener('beforeunload', function (e) { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

  show(location.hash.slice(1) || (PROCESSES[0] && PROCESSES[0].slug));
</script>

  ═══ CÁCH DÙNG ═══
  1. Double-click file này → mở trình duyệt → KÉO-THẢ sửa như bpmn.io (thêm/xóa node, đổi nhãn, vẽ mũi tên).
  2. Giữ thay đổi:
     • "⬇ Tải .bpmn"  → tải file đã sửa về máy, chép đè vào docs/{feature}/bpmn/{slug}.bpmn (LUÔN dùng được).
     • "💾 Lưu"        → ghi đè trực tiếp (Chrome/Edge, lần đầu chọn đúng file gốc). Cần chạy qua server:
         cd docs/{feature}/bpmn && npx serve   (rồi mở http://localhost:3000/_viewer.html)
  3. Sau khi sửa tay + lưu .bpmn: KHÔNG chạy lại `node bpmn-build.mjs` (sẽ regen đè mất sửa tay).
     Muốn giữ cả 2: sửa IR .ir.json rồi build lại, hoặc chỉ sửa tay trên .bpmn.
